<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lux Client - Maintenance</title>
    <link rel="icon" type="image/png" href="/resources/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e27602',
                        'primary-dark': '#b05900',
                        surface: '#121212',
                        background: '#080808',
                        'accent-dark': '#0f0f0f',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'primary-glow': '0 0 30px rgba(226, 118, 2, 0.25)',
                    }
                }
            }
        }
    </script>
    <style>
        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }
    </style>
</head>

<body
    class="bg-background text-gray-200 selection:bg-primary/30 antialiased overflow-hidden min-h-screen flex items-center justify-center relative">

    <!-- Background Decor -->
    <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div
            class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full mix-blend-screen filter blur-[100px] animate-blob">
        </div>
        <div
            class="absolute top-1/3 right-1/4 w-96 h-96 bg-yellow-500/10 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute -bottom-32 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 w-full max-w-2xl px-6 text-center">
        <div class="mb-8 relative inline-block">
            <div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full"></div>
            <img src="/resources/lux_icon.png?v=3" alt="Lux Client Logo"
                class="relative w-32 h-32 object-contain mx-auto animate-[pulse_3s_ease-in-out_infinite]">
        </div>

        <h1 class="text-5xl md:text-7xl font-black text-white tracking-tighter mb-6 relative">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-primary to-yellow-400">System</span>
            Maintenance
        </h1>

        <p class="text-xl md:text-2xl text-gray-400 font-medium mb-10 max-w-xl mx-auto leading-relaxed">
            We're currently performing some scheduled upgrades to improve your Lux Client experience. We'll be back shortly!
        </p>

        <div class="flex flex-wrap items-center justify-center gap-4">
            <a href="https://pluginhub.de/discord.html" target="_blank"
                class="px-8 py-4 bg-white/5 hover:bg-white/10 text-white rounded-2xl font-bold transition-all border border-white/10 hover:border-white/20 flex items-center gap-3">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z" />
                </svg>
                Join Discord
            </a>
            <button onclick="window.location.reload()"
                class="px-8 py-4 bg-primary hover:bg-primary-dark text-black rounded-2xl font-bold transition-all shadow-[0_0_20px_rgba(226, 118, 2,0.2)] hover:shadow-[0_0_30px_rgba(226, 118, 2,0.4)]">
                Try Access Again
            </button>
        </div>
    </div>

    <!-- Hidden Admin Bypass Toggle -->
    <div class="fixed bottom-4 right-4 z-50">
        <button onclick="toggleAdminPanel()"
            class="w-10 h-10 rounded-full flex items-center justify-center text-white/10 hover:text-white/30 transition-colors focus:outline-none"
            title="Admin Auth">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
        </button>

        <div id="admin-panel"
            class="absolute bottom-12 right-0 bg-surface/90 backdrop-blur-xl border border-white/10 p-4 rounded-2xl w-64 shadow-2xl opacity-0 translate-y-2 pointer-events-none transition-all duration-300">
            <h4 class="text-xs font-black uppercase tracking-widest text-primary mb-3">Admin Bypass</h4>
            <form id="admin-form" class="space-y-3">
                <input type="password" id="admin-pwd" placeholder="Master Password"
                    class="w-full bg-background border border-white/5 rounded-xl px-4 py-2 text-sm text-white focus:border-primary outline-none transition-all">
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-black py-2 rounded-xl text-sm font-bold transition-all">Authenticate</button>
            </form>
            <div id="admin-error" class="hidden mt-2 text-xs text-red-400 font-bold text-center">Invalid Password</div>
        </div>
    </div>

    <script>
        function toggleAdminPanel() {
            const panel = document.getElementById('admin-panel');
            if (panel.classList.contains('opacity-0')) {
                panel.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
                document.getElementById('admin-pwd').focus();
            } else {
                panel.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
            }
        }

        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('admin-error');
            const pwd = document.getElementById('admin-pwd').value;

            err.classList.add('hidden');
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/maintenance/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    btn.classList.add('bg-primary');
                    btn.textContent = 'Authorized!';
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 500);
                } else {
                    throw new Error('Invalid');
                }
            } catch (error) {
                err.classList.remove('hidden');
                btn.textContent = 'Authenticate';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
